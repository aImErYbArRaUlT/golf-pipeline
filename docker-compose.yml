# Local stack. Phase 1 only needs MinIO (S3-compatible object storage)
# standing in for S3/GCS. Airflow and Spark services are added in later
# phases. Credentials come from .env (gitignored) - never hardcoded here.
services:
  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: golf-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job: waits for MinIO, then creates the bronze bucket so the
  # stack is usable immediately after `just up`. Idempotent (mb --ignore-existing).
  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: golf-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET_BRONZE} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET_SILVER} &&
      echo 'buckets ready: '$${MINIO_BUCKET_BRONZE}' '$${MINIO_BUCKET_SILVER}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      MINIO_BUCKET_BRONZE: ${MINIO_BUCKET_BRONZE:-bronze}
      MINIO_BUCKET_SILVER: ${MINIO_BUCKET_SILVER:-silver}

  # ── Airflow (Phase 4) ────────────────────────────────────────
  # Behind the "airflow" compose profile, so `just up` still starts only MinIO.
  # `just airflow-up` starts these too; they share MinIO's network, so the DAG
  # reaches MinIO at http://minio:9000.
  postgres:
    image: postgres:16
    container_name: golf-airflow-db
    profiles: ["airflow"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    build: ./airflow
    container_name: golf-airflow
    profiles: ["airflow"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      # pipeline config - override the MinIO endpoint for the docker network,
      # and let the GCP libs find the mounted ADC at the default path.
      GOLF_ENV: dev
      MINIO_ENDPOINT: http://minio:9000
      GOOGLE_CLOUD_PROJECT: ${GCP_PROJECT_ID:-}
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/golf
      - ./airflow/dags:/opt/airflow/dags
      - ${HOME}/.config/gcloud:/home/airflow/.config/gcloud:ro
    command: standalone

  # ── Spark (Phase 5) ──────────────────────────────────────────
  # Runs the distributed silver transform via spark-submit. s3a jars are pulled
  # on first run (cached in the spark-ivy volume). Behind the "spark" profile;
  # run it one-shot with `just spark-silver`.
  spark:
    image: apache/spark:3.5.3
    container_name: golf-spark
    profiles: ["spark"]
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET_SILVER: ${MINIO_BUCKET_SILVER:-silver}
    volumes:
      - ./spark:/opt/golf-spark
    entrypoint:
      - /opt/spark/bin/spark-submit
      - --packages
      - org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - /opt/golf-spark/jobs/silver_transform.py

volumes:
  minio-data:
  airflow-db:
