version: 2

# Bronze tables are landed by the ingestion job, one per source. The dataset
# is env-scoped (<env>_bronze) and resolved from the active dbt target.
sources:
  - name: bronze
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ target.name }}_bronze"
    description: Raw launch-monitor data as landed by the ingestion pipeline.
    tables:
      - name: trackman_raw
        description: Raw TrackMan export (sanitized headers + lineage columns).
      - name: foresight_raw
        description: Raw Foresight/Garmin export (sanitized headers + lineage columns).
      - name: caddieset_raw
        description: Raw CaddieSet export (camera monitor, metric units, dual camera views).
      - name: flightscope_raw
        description: Raw FlightScope Mevo export (doppler; per-club/session files, unioned).
      - name: manual_raw
        description: A personal session landed locally via `just ingest-session` (common-schema columns).

models:
  - name: stg_trackman
    description: >
      TrackMan shots conformed to the common schema (renamed, typed, units
      normalized). TrackMan has no player/date, so those are defaulted here.
    columns:
      - name: shot_id
        description: Stable surrogate key, md5(source + row index). Unique per shot.
        data_tests: [not_null, unique]
      - name: source
        description: Originating launch monitor.
        data_tests:
          - accepted_values:
              arguments:
                values: ["trackman"]
      - name: ball_speed_mph
        description: Ball speed in mph.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 250 }
      - name: club_speed_mph
        description: Club head speed in mph.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 200 }
      - name: smash_factor
        description: Ball speed / club speed.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 2 }
      - name: launch_angle_deg
        description: Vertical launch angle in degrees (negative = downward; high = pop-up).
        data_tests:
          - between:
              arguments: { min_value: -20, max_value: 70 }
      - name: spin_rate_rpm
        description: Total spin in rpm (sentinel/negative values cleaned to null in staging).
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 16000 }
      - name: carry_yards
        description: Carry distance in yards.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 450 }

  - name: stg_caddieset
    description: >
      CaddieSet (camera monitor) conformed to the common schema. Metric units
      are converted to mph/yards here, the two camera-view rows per shot are
      deduplicated, total spin is derived from the back/side components, and the
      fields this monitor lacks (club speed, smash, launch angle, date) are
      nulled. Player comes from the anonymized GolferId.
    columns:
      - name: shot_id
        description: Stable surrogate key, md5(source + row index). Unique per shot.
        data_tests: [not_null, unique]
      - name: source
        description: Originating launch monitor.
        data_tests:
          - accepted_values:
              arguments:
                values: ["caddieset"]
      - name: player
        description: Player label derived from the anonymized GolferId.
        data_tests: [not_null]
      - name: ball_speed_mph
        description: Ball speed, converted from m/s.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 250 }
      - name: spin_rate_rpm
        description: Total spin, derived from back/side spin components.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 16000 }
      - name: carry_yards
        description: Carry distance, converted from metres.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 450 }

  - name: stg_foresight
    description: >
      Foresight/Garmin shots conformed to the common schema. Unlike TrackMan,
      this source carries real player, session date, and club type. Units are
      already mph/yards/rpm/deg, so no conversion is needed.
    columns:
      - name: shot_id
        description: Stable surrogate key, md5(source + row index). Unique per shot.
        data_tests: [not_null, unique]
      - name: source
        description: Originating launch monitor.
        data_tests:
          - accepted_values:
              arguments:
                values: ["foresight"]
      - name: player
        description: Player name from the export (populated, unlike TrackMan).
        data_tests: [not_null]
      - name: session_date
        description: Session date parsed from the Garmin timestamp.
        data_tests: [not_null]
      - name: ball_speed_mph
        description: Ball speed in mph.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 250 }
      - name: smash_factor
        description: Ball speed / club speed.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 2 }
      - name: launch_angle_deg
        description: Vertical launch angle in degrees.
        data_tests:
          - between:
              arguments: { min_value: -20, max_value: 70 }
      - name: spin_rate_rpm
        description: Total spin in rpm.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 16000 }
      - name: carry_yards
        description: Carry distance in yards.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 450 }

  - name: stg_flightscope
    description: >
      FlightScope Mevo shots conformed to the common schema. A fourth monitor
      type (doppler), already imperial. session_date is parsed from the file
      path; club codes are normalised; total/dispersion/player are absent.
    columns:
      - name: shot_id
        description: Stable surrogate key, md5(source + row index). Unique per shot.
        data_tests: [not_null, unique]
      - name: source
        description: Originating launch monitor.
        data_tests:
          - accepted_values:
              arguments:
                values: ["flightscope"]
      - name: session_date
        description: Session date parsed from the file path folder name.
        data_tests: [not_null]
      - name: ball_speed_mph
        description: Ball speed in mph.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 250 }
      - name: spin_rate_rpm
        description: Total spin in rpm.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 16000 }
      - name: carry_yards
        description: Carry distance in yards.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 450 }

  - name: stg_manual
    description: >
      A personal session ingested locally via `just ingest-session`. Its raw
      columns are already the common-schema names (the ingest step conforms the
      export before landing), so this model only types and cleans them. The
      player is stamped at ingest; session_date is optional.
    columns:
      - name: shot_id
        description: Stable surrogate key, md5(source + row index). Unique per shot.
        data_tests: [not_null, unique]
      - name: source
        description: Originating launch monitor.
        data_tests:
          - accepted_values:
              arguments:
                values: ["manual"]
      - name: player
        description: Player stamped at ingest time (the session's owner).
        data_tests: [not_null]
      - name: ball_speed_mph
        description: Ball speed in mph.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 250 }
      - name: spin_rate_rpm
        description: Total spin in rpm.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 16000 }
      - name: carry_yards
        description: Carry distance in yards.
        data_tests:
          - between:
              arguments: { min_value: 0, max_value: 450 }
